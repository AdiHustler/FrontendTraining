<!doctype html>
<html>
    <head>
        <title>Paragraph Styling</title>
    </head>
    <body>
        <h1 style="text-align: center">Multiple Paragraphs Example</h1>

        <p id="para1" style="color: blue; font-size: 18px">
            This is paragraph 1 using ID and inline style.
        </p>

        <p id="para2" style="color: green; font-weight: bold">
            This is paragraph 2 using ID and inline style.
        </p>

        <p class="highlight" style="background-color: yellow; padding: 5px">
            This paragraph uses class and inline styling.
        </p>

        <p
            class="highlight"
            style="background-color: lightgray; color: red; padding: 5px"
        >
            This is another styled paragraph.
        </p>

        <p
            class="editable"
            contenteditable="true"
            style="
                border: 1px solid black;
                padding: 10px;
                background-color: #f0f0f0;
            "
        >
            You can edit this paragraph directly on the webpage.
        </p>

        <p
            class="editable"
            contenteditable="true"
            style="
                border: 1px solid blue;
                padding: 10px;
                background-color: #e6f7ff;
            "
        >
            This paragraph is also editable.
        </p>
    </body>
</html>
