<!doctype html>
<html>
    <head>
        <title>Registration Form</title>
    </head>
    <body style="font-family: Arial; margin: 0">
        <h1>Kindly fill the following details</h1>
        <form style="width: 100%">
            <fieldset
                style="
                    width: 100%;
                    padding: 20px;
                    border: 2px solid black;
                    box-sizing: border-box;
                "
            >
                <legend
                    style="font-weight: bold; font-size: 18px; padding: 0 10px"
                >
                    Sign Up Here
                </legend>
                <div style="width: 600px; margin: 0 auto">
                    <!-- Row 1 -->
                    <div style="display: flex; gap: 20px">
                        <div style="width: 50%">
                            <label>First Name:</label><br />
                            <input
                                type="text"
                                placeholder="Enter first name"
                                style="
                                    width: 90%;
                                    padding: 6px;
                                    border-radius: 8px;
                                "
                            />
                        </div>

                        <div style="width: 50%">
                            <label>Last Name:</label><br />
                            <input
                                type="text"
                                placeholder="Enter last name"
                                style="
                                    width: 90%;
                                    padding: 6px;
                                    border-radius: 8px;
                                    border-radius: 8px;
                                "
                            />
                        </div>
                    </div>
                    <div style="display: flex; gap: 20px; margin-top: 15px">
                        <div style="width: 50%">
                            <label>Email:</label><br />
                            <input
                                type="email"
                                placeholder="Enter email"
                                style="
                                    width: 90%;
                                    padding: 6px;
                                    border-radius: 8px;
                                    border-radius: 8px;
                                "
                            />
                        </div>

                        <div style="width: 50%">
                            <label>Contact:</label><br />
                            <input
                                type="tel"
                                placeholder="Ex:123456789"
                                style="
                                    width: 90%;
                                    padding: 6px;
                                    border-radius: 8px;
                                "
                            />
                        </div>
                    </div>
                    <div style="margin-top: 15px">
                        <label>Set Password:</label><br />
                        <input
                            type="password"
                            placeholder="Enter password"
                            style="width: 45%; padding: 6px; border-radius: 8px"
                        />
                    </div>
                    <div style="margin-top: 15px">
                        <label>Profile:</label><br />
                        <input type="file" style="margin-top: 5px" />
                    </div>
                    <div style="margin-top: 20px">
                        <button
                            type="submit"
                            style="padding: 6px 12px; border-radius: 8px"
                        >
                            Submit
                        </button>
                    </div>
                </div>
            </fieldset>
        </form>
    </body>
</html>
